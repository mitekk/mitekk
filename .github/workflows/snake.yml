# Contribution-snake workflow for the NEON dashboard README.
# Place this at: .github/workflows/snake.yml  in the mitekk/mitekk repo.
# It generates two SVGs and commits them to the `output` branch, where the README's
# <picture> block reads them from raw.githubusercontent.com/mitekk/mitekk/output/...
#
# After committing: GitHub repo → Actions tab → enable workflows → run "generate contribution snake"
# once (workflow_dispatch). It then re-runs daily on its own (the contribution calendar
# changes at most daily, so more often is just Actions noise).

name: generate contribution snake

on:
  schedule:
    # daily at 03:30 UTC
    - cron: "30 3 * * *"
  workflow_dispatch:        # lets you trigger it manually the first time
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the generated SVGs to the output branch
    steps:
      - name: generate snake svgs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # light variant (default palette) + dark variant with an ember-colored snake.
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FF5A36

      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
